<div class="organisateur-shell">

  <div class="page-header mb-4">
    <h1>Tableau de bord</h1>
  </div>

  @if (!loadingStats && stats) {
    <div class="info-grid">
      
      <div class="info-cell conf-card conf-card-blue">
        <div class="card-border"></div>
        <div class="label">Conférences</div>
        <div class="value">{{ stats.conferences }}</div>
      </div>

      <div class="info-cell conf-card conf-card-purple">
        <div class="card-border"></div>
        <div class="label">Sessions</div>
        <div class="value">{{ stats.sessions }}</div>
      </div>

    </div>
  } 

  <app-conference-list></app-conference-list>

</div>
