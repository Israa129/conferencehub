<div class="organisateur-shell">

  <app-sidebar></app-sidebar>

  <main class="main-content">

    <div class="page-header mb-4">
      <div>
        <h1>Tableau de bord</h1>
        <p>Gestion des conférences</p>
      </div>

      <button class="btn btn-primary" (click)="openCreate()">
        <span class="material-icons">add</span>
        Créer une conférence
      </button>
    </div>

    <div class="kpi-grid mb-4">

      <div class="card p-3">
        <div class="kpi-value">{{ conferences.length }}</div>
        <div class="kpi-label">Conférences</div>
      </div>

      <div class="card p-3">
        <div class="kpi-value">{{ totalSessions }}</div>
        <div class="kpi-label">Sessions</div>
      </div>

      <div class="card p-3">
        <div class="kpi-value">{{ totalParticipants }}</div>
        <div class="kpi-label">Participants</div>
      </div>

      <div class="card p-3">
        <div class="kpi-value">{{ activeConferenceCount }}</div>
        <div class="kpi-label">Actives</div>
      </div>

    </div>

      <app-conference-list>
      </app-conference-list>


  </main>

</div>
