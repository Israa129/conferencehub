<div class="page-header">
  <h2>Paramètres</h2>
  <p>Personnalisez votre expérience sur ConferenceHub.</p>
</div>

<div class="settings-card">

  <h3>Notifications</h3>

  <div class="setting-item">
    <span>Notifications par email</span>
    <span>{{ notificationsEmail ? 'Activées' : 'Désactivées' }}</span>
  </div>

  <div class="setting-item">
    <span>Notifications des conférences</span>
    <span>{{ notificationsConference ? 'Activées' : 'Désactivées' }}</span>
  </div>

</div>

<div class="settings-card">

  <h3>Langue</h3>

  <div class="setting-item">
    <span>Langue actuelle</span>
    <span>{{ language }}</span>
  </div>

</div>

<div class="settings-card">

  <h3>Sécurité</h3>

  <button>
    Modifier le mot de passe
  </button>

</div>
