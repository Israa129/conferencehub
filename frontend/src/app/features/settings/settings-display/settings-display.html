<div class="settings-section">
  <div class="section-card">
    <h3>🎨 Préférences d'affichage</h3>
    <p class="section-desc">Personnalisez l'apparence de l'interface.</p>

    <div class="alert success" *ngIf="success">✅ {{ success }}</div>
    <div class="alert error"   *ngIf="error">❌ {{ error }}</div>

    <div class="form-group">
      <label>Thème</label>
      <div class="radio-group">
        <label *ngFor="let t of themes"
               class="radio-card"
               [class.selected]="form.theme === t.value">
          <input type="radio" [(ngModel)]="form.theme" [value]="t.value" />
          {{ t.label }}
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>Langue de l'interface</label>
      <select [(ngModel)]="form.langue">
        <option *ngFor="let l of langues" [value]="l.value">{{ l.label }}</option>
      </select>
    </div>

    <div class="form-group">
      <label>Densité d'affichage</label>
      <div class="radio-group">
        <label *ngFor="let d of densites"
               class="radio-card"
               [class.selected]="form.densite === d.value">
          <input type="radio" [(ngModel)]="form.densite" [value]="d.value" />
          {{ d.label }}
        </label>
      </div>
    </div>

    <button class="btn-primary" (click)="save()" [disabled]="loading">
      {{ loading ? 'Enregistrement...' : 'Sauvegarder' }}
    </button>
  </div>
</div>
