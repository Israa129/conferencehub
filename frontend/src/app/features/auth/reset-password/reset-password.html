<main class="auth-page">
  <section class="auth-hero">
    <div class="hero-content">
      <h1>
        La plateforme de référence pour les
        <span>conférences scientifiques</span>
      </h1>
    </div>
  </section>

  <section class="auth-panel">
    <div class="auth-card">

      <header>
        <h2>🔒 Nouveau mot de passe</h2>
        <p>Choisissez un nouveau mot de passe sécurisé.</p>
      </header>

      <div *ngIf="message" class="succes">
        {{ message }} Redirection en cours...
      </div>
      <div *ngIf="erreur" class="alert">{{ erreur }}</div>

      <form (ngSubmit)="onSubmit()" *ngIf="!message">

        <label for="password">Nouveau mot de passe *</label>
        <input
          id="password"
          [(ngModel)]="form.password"
          name="password"
          type="password"
          placeholder="Minimum 6 caractères"
          required
        />

        <label for="confirm">Confirmer le mot de passe *</label>
        <input
          id="confirm"
          [(ngModel)]="form.password_confirmation"
          name="password_confirmation"
          type="password"
          placeholder="Répétez le mot de passe"
          required
        />

        <button class="submit-btn" type="submit" [disabled]="chargement">
          {{ chargement ? 'Réinitialisation...' : 'Réinitialiser le mot de passe' }}
        </button>

      </form>

      <div class="back-link">
        <a routerLink="/login">← Retour à la connexion</a>
      </div>

    </div>
  </section>
</main>
